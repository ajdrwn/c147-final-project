# @package transforms

to_tensor:
  _target_: emg2qwerty.transforms.ToTensor
  fields: [emg_left, emg_right]

band_rotation:
  _target_: emg2qwerty.transforms.ForEach
  transform:
    _target_: emg2qwerty.transforms.RandomBandRotation
    offsets: [-1, 0, 1]

temporal_jitter:
  _target_: emg2qwerty.transforms.TemporalAlignmentJitter
  max_offset: 120

amplitude_scale:
  _target_: emg2qwerty.transforms.RandomAmplitudeScale
  min_scale: 0.85
  max_scale: 1.15

logspec:
  _target_: emg2qwerty.transforms.LogSpectrogram
  n_fft: 64
  hop_length: 16

specaug:
  _target_: emg2qwerty.transforms.SpecAugment
  n_time_masks: 3
  time_mask_param: 25
  n_freq_masks: 2
  freq_mask_param: 4

train:
  - ${transforms.to_tensor}
  - ${transforms.band_rotation}
  - ${transforms.temporal_jitter}
  - ${transforms.amplitude_scale}
  - ${transforms.logspec}
  - ${transforms.specaug}

val:
  - ${transforms.to_tensor}
  - ${transforms.logspec}

test: ${transforms.val}